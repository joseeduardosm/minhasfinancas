{% load static l10n %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Lancamento | Minhas Financas</title>
    <link rel="stylesheet" href="{% static 'welcome/css/edit_entry.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/welcome/">MINHAS FINANCAS</a>
            <a class="back-link" href="{{ next_url }}">Voltar</a>
        </div>
    </header>

    <main class="edit-shell">
        {% if messages %}
            <section class="messages-wrap">
                {% for message in messages %}
                    <div class="msg {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        <section class="edit-card">
            <h1>Editar Lancamento</h1>
            <p class="subtitle">Atualize os dados do evento financeiro selecionado.</p>

            <form method="post" class="edit-form">
                {% csrf_token %}
                <input type="hidden" name="year" value="{{ year }}">
                <input type="hidden" name="month" value="{{ month }}">
                <input type="hidden" name="day" value="{{ day }}">
                <input type="hidden" name="next" value="{{ next_url }}">

                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo" required>
                    {% for value, label in tipo_choices %}
                        <option value="{{ value }}" {% if transacao.tipo == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>

                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" required maxlength="120" value="{{ transacao.nome }}">

                <label for="valor">Valor</label>
                <input id="valor" name="valor" type="number" min="0.01" step="0.01" required value="{{ transacao.valor|unlocalize }}">

                <label for="data_base">Data</label>
                <input id="data_base" name="data_base" type="date" required value="{{ transacao.data_base|date:'Y-m-d' }}">

                <label class="toggle-recorrencia">
                    <input id="is_recorrente" name="is_recorrente" type="checkbox" value="1" {% if is_recorrente %}checked{% endif %}>
                    Evento recorrente
                </label>

                <div class="recorrencia-fields" {% if not is_recorrente %}hidden{% endif %}>
                    <label for="recorrencia">Recorrencia</label>
                    <select id="recorrencia" name="recorrencia" data-recorrencia-field>
                        {% for value, label in recorrencia_choices %}
                            <option value="{{ value }}" {% if transacao.recorrencia == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>

                    <label for="data_fim_recorrencia">Data fim da recorrencia</label>
                    <input
                        id="data_fim_recorrencia"
                        name="data_fim_recorrencia"
                        type="date"
                        data-recorrencia-field
                        value="{{ transacao.data_fim_recorrencia|date:'Y-m-d' }}"
                    >
                </div>

                <label for="status">Status</label>
                <select id="status" name="status" required>
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if transacao.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>

                <div class="actions">
                    <a class="btn secondary" href="{{ next_url }}">Cancelar</a>
                    <button class="btn primary" type="submit">Salvar alteracoes</button>
                </div>
            </form>

            <form class="delete-form delete-scope-form" method="post" action="{% url 'welcome:delete_entry' transacao.id %}">
                {% csrf_token %}
                <input type="hidden" name="year" value="{{ year }}">
                <input type="hidden" name="month" value="{{ month }}">
                <input type="hidden" name="day" value="{{ day }}">
                <input type="hidden" name="next" value="{{ next_url }}">
                <input type="hidden" name="occurrence_date" value="{{ occurrence_date }}">
                <input type="hidden" name="delete_scope" value="all">
                <input type="hidden" name="is_recurring" value="{% if is_recorrente %}1{% else %}0{% endif %}">
                <button class="btn danger" type="submit">Excluir</button>
            </form>
        </section>
    </main>
    <script src="{% static 'welcome/js/delete_scope.js' %}"></script>
    <script src="{% static 'welcome/js/recorrencia_toggle.js' %}"></script>
</body>
</html>
